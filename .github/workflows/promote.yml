name: promote (reusable)
# Grammaire Coolify PARTAGÉE — promote prod. Appelé par le promote.yml de chaque repo via
# `uses: a-v-q-n/avqn-dev/.github/workflows/promote.yml@main`. Lit le sha actuellement en
# PREVIEW (source de vérité validée) et le reporte sur PROD. Coolify ne build jamais.
# Deux modes (cf. deploy.yml) : service (compose, défaut) | application (docker image).
on:
  workflow_call:
    inputs:
      preview_uuid: { required: true,  type: string, description: "UUID Coolify preview (source du sha)" }
      prod_uuid:    { required: true,  type: string, description: "UUID Coolify prod (cible)" }
      health_url:   { required: true,  type: string, description: "URL de health-check prod (200 attendu ; si la réponse expose un champ sha, il doit correspondre au sha promu)" }
      mode:         { required: false, type: string, default: service, description: "service | application" }
    secrets:
      coolify_token: { required: true }

jobs:
  promote:
    runs-on: ubuntu-latest
    concurrency:
      group: promote-${{ inputs.prod_uuid }}
      cancel-in-progress: false
    env:
      API: https://deploy.avqn.ch/api/v1
      COOLIFY_TOKEN: ${{ secrets.coolify_token }}
      MODE: ${{ inputs.mode }}
      PREVIEW: ${{ inputs.preview_uuid }}
      PROD: ${{ inputs.prod_uuid }}
      HEALTH: ${{ inputs.health_url }}
    steps:
      - name: Promotion preview → prod (report sha, déclenche, vérifie 200 + sha)
        run: |
          set -euo pipefail
          case "$MODE" in
            service)
              sha=$(curl -fsS -H "Authorization: Bearer $COOLIFY_TOKEN" "$API/services/$PREVIEW/envs" \
                | jq -r '.[] | select(.key=="IMAGE_TAG") | .value' | head -1) ;;
            application)
              sha=$(curl -fsS -H "Authorization: Bearer $COOLIFY_TOKEN" "$API/applications/$PREVIEW" \
                | jq -r '.docker_registry_image_tag') ;;
            *) echo "::error::mode inconnu '$MODE' (service|application)"; exit 1 ;;
          esac
          case "$sha" in sha-*) : ;; *) echo "::error::image preview absente/invalide ('$sha')"; exit 1 ;; esac
          echo "📦 promotion de \`$sha\` ($MODE) preview → prod \`$PROD\`" >> "$GITHUB_STEP_SUMMARY"
          case "$MODE" in
            service)
              curl -fsS -X PATCH "$API/services/$PROD/envs" \
                -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Content-Type: application/json" \
                -d "{\"key\":\"IMAGE_TAG\",\"value\":\"$sha\"}" ;;
            application)
              curl -fsS -X PATCH "$API/applications/$PROD" \
                -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Content-Type: application/json" \
                -d "{\"docker_registry_image_tag\":\"$sha\"}" ;;
          esac
          curl -fsS -X POST "$API/deploy?uuid=$PROD" -H "Authorization: Bearer $COOLIFY_TOKEN"
          expected="${sha#sha-}"
          for i in $(seq 1 40); do
            code=$(curl -sS --max-time 5 -o health-body -w '%{http_code}' "$HEALTH" || true)
            if [ "$code" = "200" ]; then
              served=$(jq -r '.sha // empty' health-body 2>/dev/null || true)
              if [ -z "$served" ]; then
                echo "::warning::health endpoint sans champ sha — vérification faible"
                echo "✓ prod répond 200 (sans sha exposé)"; exit 0
              fi
              case "$served" in "$expected"*) echo "✓ prod répond 200 et sert le sha attendu ($expected)"; exit 0 ;; esac
              case "$expected" in "$served"*) echo "✓ prod répond 200 et sert le sha attendu ($expected)"; exit 0 ;; esac
              echo "tentative $i/40 : 200 mais sha servi '$served' ≠ attendu '$expected' (conteneur périmé) ; nouvel essai 10s"
            else
              echo "tentative $i/40 (code ${code:-?}) ; nouvel essai 10s"
            fi
            sleep 10
          done
          echo "::error::prod ne répond pas 200 avec le sha attendu ($expected) après ~7min"; exit 1
